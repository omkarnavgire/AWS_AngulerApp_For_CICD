version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Checking node and npm versions..."
      - node -v
      - npm -v
      - echo "Installing dependencies..."
      - npm ci --legacy-peer-deps

  build:
    commands:
      - echo "Building the React application..."
      - ng run build

artifacts:
  files:
    - '**/*'
  base-directory: build
  discard-paths: no
